<!DOCTYPE html>
<html lang="es">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lobster&family=Nunito:ital,wght@0,600;1,600&family=Poppins:ital,wght@0,200;0,400;0,500;1,200;1,500&family=Source+Serif+Pro:ital,wght@0,300;0,400;1,200&family=Titillium+Web:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.0.0/css/line.css"
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We"
      crossorigin="anonymous"
    />
    <!-- Argon CSS -->
    <link
      type="text/css"
      href="css/argon-design-system.min.css"
      rel="stylesheet"
    />
    <!-- style personal -->
    <link type="text/css" href="css/style.css" rel="stylesheet" />
    <title>Jorge Steven Moreno Parra</title>
  </head>
  <body>
    <!-- header -->
    <header class="header">
      <nav class="nav container navbar-expand-lg">
        <a href="" class="nav_logo navbar-brand ml-3">Jorge Moreno</a>
        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#navbar-default"
          aria-controls="#navbar-default"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="nav_menu" id="nav-menu">
          <ul class="nav__list grid">
            <li class="nav__item">
              <a href="#home" class="nav__link">
                <i class="uil uil-home nav-icon"></i>Home
              </a>
            </li>
            <li class="nav__item">
              <a href="#about" class="nav__link">
                <i class="uil uil-user nav-icon"></i>About
              </a>
            </li>
            <li class="nav__item">
              <a href="#skills" class="nav__link">
                <i class="uil uil-file nav-icon"></i>Skills
              </a>
            </li>
            <li class="nav__item">
              <a href="#experience" class="nav__link">
                <i class="uil uil-diary-alt nav-icon"></i>Experience
              </a>
            </li>

            <li class="nav__item">
              <a href="#portfolio" class="nav__link">
                <i class="uil uil-suitcase nav-icon"></i>Portfolio
              </a>
            </li>

            <li class="nav__item">
              <a href="#contact" class="nav__link">
                <i class="uil uil-envelope nav-icon"></i>Contact Us
              </a>
            </li>
          </ul>
        </div>
        <div class="nav__btns">
          <!-- theme changin button -->
          <i data-mode="dark" class="uil uil-moon"> </i>
        </div>
      </nav>
    </header>
    <!-- main -->
    <main class="main">
      <!-- home -->
      <section class="home section" id="home"></section>
      <!-- about me -->
      <section class="about section" id="about"></section>
      <!-- (Skills ) -->
      <section class="skills section" id="skills"></section>
      <!-- (experience) -->
      <section class="experience section" id="experience"></section>
      <!-- portfolio -->
      <section class="portfolio section" id="portfolio"></section>
      <!-- contact us -->
      <section class="contact section" id="contact"></section>
    </main>
    <!-- footer -->
    <footer class="footer"></footer>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <!-- <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-U1DAWAznBHeqEIlVSCgzq+c9gqGAJn5c/t99JyeKa9xxaYpSvHU5awsuZVVFIhvj"
      crossorigin="anonymous"
    ></script> -->

    <!-- Core -->
    <script src="js/core/jquery.min.js"></script>
    <script src="js/core/popper.min.js"></script>
    <script src="js/core/bootstrap.min.js"></script>

    <!-- Argon JS -->
    <script src="js/argon-design-system.js"></script>
    <!-- Script js -->
    <script src="js/script.js"></script>
  </body>
</html>
